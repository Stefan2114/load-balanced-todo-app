services:
  reverse-proxy:
    image: nginx:alpine
    extra_hosts:
      - "host.docker.internal:host-gateway" # added this to work with fe not being a container
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs:/var/log/nginx
    depends_on:
      - web-app
      # - todo-fe
    networks:
      - todo-network

  # todo-fe:
  #   build: ./todo-frontend
  #   restart: always
  #   networks:
  #     - todo-network

  web-app:
    build: ./todo-server
    restart: always
    deploy:
      replicas: 2
    environment:
      - DB_HOST=db-master
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - todo-network

  db-master:
    image: bitnami/postgresql:latest
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_USERNAME=${POSTGRES_USER}
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRES_DB}
    volumes:
      - db-master-data:/bitnami/postgresql
    networks:
      - todo-network

  db-slave:
    image: bitnami/postgresql:latest
    depends_on:
      - db-master
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_MASTER_HOST=db-master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD} 
    volumes:
      - db-slave-data:/bitnami/postgresql
    networks:
      - todo-network


  log-analyzer:
    image: allinurl/goaccess:latest
    volumes:
      - ./logs:/opt/goaccess/logs
    command: goaccess /opt/goaccess/logs/access.log --log-format=COMBINED --real-time-html -o /opt/goaccess/logs/report.html
    ports:
      - "7890:7890"
    networks:
      - todo-network
  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=pass
    ports:
      - "8081:80"
    networks:
      - todo-network

  

networks:
  todo-network:
    driver: bridge
    
volumes:
  db-master-data:
  db-slave-data:
