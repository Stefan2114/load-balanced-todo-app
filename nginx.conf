events {
    worker_connections 1024;
}

http {
    # This defines the group of servers to balance between
    upstream backend_servers {
        server web-app:80; # Docker DNS automatically finds both replicas
    }
    
    server {
        listen 8080; # Internal container port
        server_name localhost;
        return 301 https://$host:8443$request_uri;
    }

    # 2. Main HTTPS Server on 8443 
    server {
        listen 8443 ssl; # Internal container port
        server_name localhost;

        # SSL Configuration 
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        location / {
            # proxy_pass http://todo-fe:5173; 
            proxy_pass http://host.docker.internal:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 2. API Routing (The Go Backend)
        # Your FE should make calls to https://localhost:8443/api/...
        location /api/ {

            allow 127.0.0.1; # Allow your local network
            allow 172.16.0.0/12;  # Allow Docker internal network
            deny all;
            # The trailing slash here strips "/api/" before sending to Go
            proxy_pass http://backend_servers/; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
